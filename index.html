<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp xịn</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
        font-family: Arial, sans-serif;
        text-align: center;
        color: white;
    }
    .card {
        background: rgba(0,0,0,0.3);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        z-index: 2;
    }
    button {
        margin-top: 20px;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        background: #ff4d6d;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }
    .heart {
        position: absolute;
        color: red;
        font-size: 20px;
        animation: float 3s linear forwards;
    }
    @keyframes float {
        0% {transform: translateY(0) scale(1); opacity:1;}
        100% {transform: translateY(-600px) scale(1.5); opacity:0;}
    }
</style>
</head>
<body>

<div class="card">
    <h1>💖 Chào ngày mới các tình yêu 💖</h1>
    <p>ANH XIN PHÉP ĐƯỢC YÊU TẤT CẢ CÁC EM hẹ hẹ</p>
    <p><b>From:</b> Anh đẹp zai chạy máy AUTO DG 😎</p>
    <button onclick="love()">Bấm đi anh yêu em 😘</button>
</div>

<script>
function love() {
    for(let i=0;i<30;i++){
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.top = "80vh";
        heart.style.fontSize = (Math.random()*20+20)+"px";
        document.body.appendChild(heart);

        setTimeout(()=>{heart.remove();},3000);
    }
}
</script>

</body>
</html>
